# Preview deployments (same pattern as web3bio-canary):
# opennext build + wrangler versions upload with a stable preview alias URL.
# Production traffic stays on the version deployed from main (deploy.yml).

name: Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [staging]

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve preview alias
        id: alias
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare secrets file
        run: printf 'ETHERSCAN_API_KEY=%s\n' "$ETHERSCAN_API_KEY" > .cf-secrets.env
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

      - name: Build and upload preview version
        id: upload
        run: |
          set -o pipefail
          npx opennextjs-cloudflare build
          npx wrangler versions upload \
            --keep-vars \
            --preview-alias "${{ steps.alias.outputs.value }}" \
            --secrets-file .cf-secrets.env \
            --tag "${{ github.sha }}" \
            --message "${{ github.event_name }}:${{ github.ref_name }}" \
            2>&1 | tee upload.log
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Resolve preview URL
        id: url
        run: |
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' upload.log | head -1 || true)
          if [ -z "$URL" ]; then
            URL="https://${{ steps.alias.outputs.value }}-receipt-is.workers.dev"
          fi
          echo "value=$URL" >> "$GITHUB_OUTPUT"
          echo "### Preview deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Alias:** \`${{ steps.alias.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on pull request
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Preview ready

            | | |
            |---|---|
            | **URL** | ${{ steps.url.outputs.value }} |
            | **Alias** | `${{ steps.alias.outputs.value }}` |
            | **Commit** | `${{ github.sha }}` |

            Updated on each push to this PR. Production (`main`) is unchanged.
